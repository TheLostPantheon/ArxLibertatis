// PS Vita controller tutorial text overrides
// Replaces PC keyboard/mouse references with Vita button names

[system_tutorial_0]
string="Look in the shop chest, pick up objects you want to buy or drop in items you want to sell."

[system_tutorial_0bis]
string="Hand over your broken weapons or armor to the blacksmith to have them repaired."

[system_tutorial_1]
string="Use the right stick to look around."

[system_tutorial_1_new]
string="Press Cross on this message to close it."

[system_tutorial_1_new2]
string="Tutorial messages can be found in the log section of your quest book (Select button)."

[system_tutorial_2]
string="Press and hold Cross on objects to move them around. To place an item directly into your inventory, press Cross on the object while holding L1."

[system_tutorial_2_new]
string="Press Cross on any fixed object to activate it."

[system_tutorial_2bis]
string="Press Select or tap the BOOK icon to open your quest book."

[system_tutorial_2tris]
string="Press Square or tap the BELT icon to open your inventory."

[system_tutorial_3bis]
string="Equip the bone by pressing Cross when the cursor is over it."

[system_tutorial_3bis_new]
string="Press D-pad Up to go into 'COMBAT MODE'."

[system_tutorial_3bis_new2]
string="Press R1 to strike. The longer you hold R1, the harder you will strike."

[system_tutorial_3]
string="Press Cross on any character to talk to him."

[system_tutorial_4]
string="Press D-pad Up to exit 'COMBAT MODE'.*Press Cross on dead bodies to open their inventories."

[system_tutorial_4_new]
string="Drag items into your inventory using the touch screen.*Press Cross when the cursor is over an object to use it."

[system_tutorial_5]
string="Press R1 or D-pad Up to fight."

[system_tutorial_5bis]
string="When fighting, press and hold R1 then release to hit. The longer you hold, the harder you hit."

[system_tutorial_6]
string="You've just found your first runes. Put them in your book by pressing Cross."

[system_tutorial_6bis]
string="Now that you have your first runes, open your book and cast your first spell."

[system_tutorial_7]
string="Crouch by pressing D-pad Down and smash the wooden trap."

[system_tutorial_8]
string="Press Cross on the rope in your inventory once you have found it, then tap the elevator mechanism to tie it."

[system_tutorial_9]
string="Tap a spell icon to see its formula. The formula will stay on-screen as reference when you close the book."

[system_tutorial_10]
string="Press and hold Triangle to go into magic mode and draw the runes using the touch screen, one at a time, then release Triangle to cast the spell."

[system_tutorial_10_bis]
string="Well done! Note that you can precast spells in order to cast them later. To precast a spell, hold L1 as you cast the spell. You can precast up to 3 spells."

[system_tutorial_11]
string="Teleporter now activated; you won't be able to travel through the portals until other teleporters have been activated."

[system_tutorial_12]
string="Try to ignite the fireplace and then place some raw food near the fire to cook it."

[system_tutorial_13]
string="Try to cast the Ignite Spell on the torches to light the corridor."

[system_tutorial_14]
string="Press Cross on a Magic Scroll to memorise the spell."

[system_tutorial_15]
string="Now the spell has been precast. When you want to cast this spell, just press Cross on the spell symbol that has just appeared at the bottom of the screen."

[system_tutorial_16]
string="Tap the Stair icon to change level."

[system_tutorial_level_01]
string="Congratulations! Your character's level has increased! Tap the red cross to allocate additional experience points."

[system_tutorial_level_02]
string="Add points by tapping an attribute's icon; the cursor will indicate the number of points remaining."

[system_tutorial_17]
string="To place an item, or stack of items directly into your inventory, press Cross on the object while holding L1."

[system_tutorial_18]
string="Move the stack of bread by pressing and holding Cross, then drag it into your inventory while holding L1."

[tutorial_bag]
string="Tap the inventory belt to show what's inside all your bags."

[tutorial_bag_02]
string="Note you can reorganize your inventory by pressing Cross on your inventory belt icon."

[tutorial_lever]
string="To repair the mechanism, press Cross on the lever you've just found and then tap the lever base on the wall nearby."

[tutorial_shop]
string="You're now in transaction mode. BEWARE: A transaction is effective as soon as you pick up an item from, or drop an item into the shopkeeper's chest. You can not change your mind and no refunds are given."

[tutorial_mode_01]
string="You are in cursor mode."

[tutorial_mode_02]
string="You are in free look mode."

[tutorial_stealth]
string="NPCs can hear you, so mind your footsteps. You can try throwing an item away from you and it might make hostile NPCs move towards it.*Note that the stealth icon shows up in the bottom lefthand corner of the screen when you are hiding."

[tutorial_steal]
string="Did you know that you can steal from people? You need to have at least 50 in stealth to do this. Simply bump into somebody so you can see that person's inventory icon in the bottom-left corner of the screen. Then, tap this icon and have a look at what you'd like to steal: beware though, don't get caught in the act!"
